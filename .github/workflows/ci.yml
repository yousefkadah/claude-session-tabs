name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run package

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies -o claude-session-tabs.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-session-tabs-vsix
          path: claude-session-tabs.vsix
          if-no-files-found: error
